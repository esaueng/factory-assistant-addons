# Factory Assistant — PLC Gateway Helper (Modbus read-only).
#
# Standard Home Assistant add-on config schema (kept unchanged for
# Supervisor/community compatibility). This helper polls explicitly configured
# Modbus TCP input/holding registers and republishes their values to MQTT. It
# allows function codes 3 and 4 only and refuses startup if write/control flags
# are enabled. See DOCS.md and the Factory Assistant safety boundary.
---
name: PLC Gateway Helper (read-only)
version: "0.1.0"
slug: plc_gateway_helper
description: >-
  Read-only PLC telemetry helper: poll approved Modbus TCP input/holding
  registers and republish values to MQTT with discovery. Function codes 3/4
  only; no writes, coils, control paths, or safety controller use.
url: "https://github.com/esaueng/factory-assistant-addons/tree/main/plc-gateway-helper"
image: ghcr.io/esaueng/{arch}-addon-plc-gateway-helper
arch:
  - amd64
init: false
startup: services
boot: manual
host_network: false
hassio_api: false
homeassistant_api: false
services:
  - mqtt:need
options:
  log_level: info
  site: "plant1"
  mqtt:
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    base_topic: "fa"
    discovery_prefix: "homeassistant"
    discovery: true
  modbus:
    host: "plc.example.local"
    port: 502
    unit_id: 1
    poll_interval: 5.0
    timeout: 3.0
    allowed_function_codes:
      - 3
      - 4
    write_functions_allowed: false
    safety_controller_allowed: false
  registers:
    - function_code: 3
      address: 40001
      count: 1
      area: "line1"
      device: "press03"
      measurement: "cycle_count"
      data_type: "uint16"
      scale: 1.0
      offset: 0.0
      unit_of_measurement: ""
      state_class: "measurement"
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  site: str
  mqtt:
    host: str
    port: port
    username: str?
    password: password?
    base_topic: str
    discovery_prefix: str
    discovery: bool
  modbus:
    host: str
    port: port
    unit_id: int(1,247)
    poll_interval: float(0.5,3600.0)
    timeout: float(0.5,60.0)
    allowed_function_codes:
      - int(3,4)
    write_functions_allowed: bool
    safety_controller_allowed: bool
  registers:
    - function_code: list(3|4)
      address: int(0,65535)
      count: int(1,2)
      area: str
      device: str
      measurement: str
      data_type: list(uint16|int16|uint32|int32|float32|bool)
      scale: float
      offset: float
      unit_of_measurement: str?
      device_class: str?
      state_class: list(measurement|total|total_increasing)?
