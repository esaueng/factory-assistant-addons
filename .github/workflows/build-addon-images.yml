name: Build add-on images

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      publish_images:
        description: "Push images to GHCR"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.addon }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - addon: opcua-mqtt-bridge
            image: ghcr.io/esaueng/amd64-addon-opcua-mqtt-bridge
            version: "0.1.0"
          - addon: plc-gateway-helper
            image: ghcr.io/esaueng/amd64-addon-plc-gateway-helper
            version: "0.1.0"
          - addon: historian-storage
            image: ghcr.io/esaueng/amd64-addon-historian-storage
            version: "0.1.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.publish_images == true) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.addon }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || inputs.publish_images == true) }}
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ matrix.version }}
            ${{ matrix.image }}:${{ github.ref_name }}
